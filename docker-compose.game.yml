services:
  poker_game:
    build:
      context: .
      dockerfile: Dockerfile.game
    container_name: poker_game
    environment:
      - POKER_BOT_API_URL=${POKER_BOT_API_URL:?Set POKER_BOT_API_URL to the EC2 /get_action endpoint}
      - POKER_BOT_TIMEOUT_SECONDS=${POKER_BOT_TIMEOUT_SECONDS:-8}
      - POKER_CORS_ORIGINS=${POKER_CORS_ORIGINS:-*}
    ports:
      - "8000:8000"

  frontend_dev:
    image: node:24-slim
    container_name: poker_frontend_dev
    working_dir: /app/frontend
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

