name: deploy-api.yml
on:
  push:
    branches:
      - rl-infrastructure-update

jobs:
  build_and_push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout out repository
      uses: actions/checkout@v4

    - name: Log in to the Github Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
          context: .
          file: Dockerfile.api
          push: true
          tags: ghcr.io/danielsjohnson/poker-api:latest

  deploy_to_ec2:
    needs: build_and_push
    runs-on: ubuntu-latest

    steps:
    - name: Execute deployment commands on EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # Fail the script immediately if any command returns a non-zero status
          set -e
          
          # 1. Clean up unused/dangling images to free up space BEFORE pulling
          docker image prune -a -f
          
          # 2. Pull the newly built image (No login required for public packages!)
          docker pull ghcr.io/danielsjohnson/poker-api:latest
          
          # 3. Gracefully stop and remove the old container
          docker stop running_poker_api || true
          docker rm running_poker_api || true
          
          # 4. Start the new brain on port 8000
          docker run -d -p 8000:8000 --name running_poker_api ghcr.io/danielsjohnson/poker-api:latest