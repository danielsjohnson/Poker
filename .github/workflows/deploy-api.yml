name: deploy-api.yml
on:
  push:
    branches:
      - rl-infrastructure-update

jobs:
  build_and_push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout out repository
      uses: actions/checkout@v4

    - name: Log in to the Github Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
          context: .
          file: Dockerfile.api
          push: true
          # Using a consistent hardcoded tag to avoid Docker casing errors
          tags: ghcr.io/danielsjohnson/poker-api:latest

  deploy_to_ec2:
    needs: build_and_push
    runs-on: ubuntu-latest

    steps:
    - name: Execute deployment commands on EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # Fail the script immediately if any command returns a non-zero status
          set -e
          
          # (Requires adding a Personal Access Token to GitHub Secrets as GHCR_PAT)
          echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u danielsjohnson --password-stdin
          
          docker image prune -a -f
          
          docker pull ghcr.io/danielsjohnson/poker-api:latest
          
          docker stop running_poker_api || true
          docker rm running_poker_api || true
          
          docker run -d -p 8000:8000 --name running_poker_api ghcr.io/danielsjohnson/poker-api:latest